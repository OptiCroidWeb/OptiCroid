<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="google-site-verification" content="1h0mJmEKKiB0WFa2w9Txokx6s4TYYGrI54m2dTZAwCk" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiCroid</title>
  <link rel="icon" type="Logo.png" href="Logo.png">
  <style>
    /* Benachrichtigungs-Stil (unberührt) */
    #notification-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px);
      display: none; justify-content: center; align-items: center; z-index: 2000;
    }
    .notification-box {
      background: white; color: black; padding: 30px; border-radius: 25px;
      text-align: center; width: 85%; max-width: 350px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .notification-box button {
      margin-top: 20px; background: #0c1a26; color: white; border: none;
      padding: 10px 30px; border-radius: 15px; font-weight: bold; cursor: pointer;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; margin: 0; padding: 0; background-color: #0c1a26; color: #ffffff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

    main { padding: 40px 10px; display: flex; flex-direction: column; align-items: center; gap: 50px; width: 100%; }

    .content { 
        display: block; 
        text-align: center; 
        background-color: #1a334a; 
        width: 95%; 
        max-width: 800px; 
        border-radius: 30px; 
        padding: 5%; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        border: 1px solid rgba(255,255,255,0.05);
        margin: 0 auto;
        position: relative;
    }

    img { max-width: 100%; height: auto; }

    /* Spenden-Element oben rechts */
    .donation-container {
        position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: center; text-decoration: none;
    }
    .coin {
        background: #FFD700; width: 45px; height: 45px; border-radius: 50%; border: 2px solid #b8860b;
        display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .piggy { font-size: 30px; margin-top: -5px; }
    .donate-label { color: #FFD700; font-size: 10px; font-weight: bold; margin-top: 3px; }

    /* Dynamischer Anrufen Button */
    #call-btn { 
        border: none; color: white; padding: 12px 25px; border-radius: 20px; 
        cursor: pointer; font-weight: bold; text-decoration: none; margin: 5px; 
        display: inline-block; transition: background 0.3s;
    }
    .btn-green { background-color: #008000; }
    .btn-red { background-color: #ff4d4d; }

    .special-offer-btn {
        display: inline-block; background: #FFD700; color: #000; padding: 10px 25px;
        font-weight: 900; text-decoration: none; font-size: 16px; border-radius: 50px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-bottom: 25px; transition: transform 0.2s;
    }
    .special-offer-btn:hover { transform: scale(1.05); background: #fff; }
  </style>
</head>
<body>

  <main>
    <section id="startseite" class="content">
      <!-- Spenden-Bereich mit Münze und Schwein -->
      <a href="https://www.paypal.me/ITHilfe31" target="_blank" class="donation-container">
        <div class="coin"><span class="piggy">🐷</span></div>
        <span class="donate-label">Trinkgeld</span>
      </a>

      <!-- Header in Weiß/Grau -->
      <p style="color: #ffffff; font-size: clamp(20px, 5vw, 40px); font-weight: 900;">
        IT <span style="color: #bbb;">Hilfe</span>
      </p>

      <!-- Logo mit Weißem Rahmen -->
      <img src="Logo.png" style="width:200px; border-radius: 50%; border: 4px solid #ffffff; margin: 20px 0;"/><br>

      <a href="tel:+4915206821179" id="call-btn">Anrufen</a>

      <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div style="text-align: left;">Umkreis: Steingaden<br><small style="color: #bbb;">5 Min.</small></div>
        <img src="Screenshot_20260420_161537_Google.jpg" alt="Standort" style="width: 80px; height: 60px; object-fit: cover; border-radius: 8px; background: #ddd;">
      </div>

      <div style="padding: 15px 0;">
        <details>
          <summary style="cursor: pointer; list-style: none; font-weight: 900; text-align: center;">
            <span id="status-text" style="border: 2px solid #ffffff; padding: 5px 15px; border-radius: 12px; display: inline-block;">Prüfe...</span> ▼
          </summary>
          <table id="opening-table" style="width: 100%; margin-top: 15px; color: #ffffff; font-size: 0.9em; border-collapse: collapse; text-align: left;">
          </table>
        </details>
      </div>
    </section>

    <!-- Tutorial Bereich (unberührt) -->
    <section id="tutorial" class="content" style="background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 0;">
  <details style="width: 100%;">
    <summary style="cursor: pointer; padding: 15px; font-weight: bold; color: #bbb; list-style: none; display: flex; justify-content: space-between; align-items: center;">
      <span>TUTORIAL</span>
      <span>▼</span>
    </summary>
    <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); overflow: hidden;">
      <img src="erklär-bild.png" id="tutorial-img" onclick="toggleZoom(this)" style="width: 100%; border-radius: 15px; cursor: zoom-in; transition: transform 0.3s ease;">
    </div>
  </details>
</section>
  
<section id="livestream" class="content" style="background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 0; margin-top: 20px;">
  <details style="width: 100%;">
    <summary style="cursor: pointer; padding: 15px; font-weight: bold; color: #bbb; list-style: none; display: flex; justify-content: space-between; align-items: center;">
      <span>LIVE STREAM</span>
      <span>▼</span>
    </summary>
    <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
      <div style="position: relative; width: 100%; padding-bottom: 56.25%; height: 0;">
        <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 15px;" 
                src="https://www.youtube.com/embed/DEINE_VIDEO_ID" 
                frameborder="0" 
                allowfullscreen>
        </iframe>
      </div>
    </div>
  </details>
</section>
</main>

  <script>
  function toggleZoom(img) {
    if (img.style.transform === "scale(2)") {
      img.style.transform = "scale(1)";
      img.style.cursor = "zoom-in";
    } else {
      img.style.transform = "scale(2)";
      img.style.cursor = "zoom-out";
    }
  }
</script>

  <script>
  // Die Daten bleiben technisch korrekt (Sonntag an Index 0)
  const schedule = [
    { day: "Sonntag", open: 0, close: 0, label: "geschlossen" },
    { day: "Montag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Dienstag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Mittwoch", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Donnerstag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Freitag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Samstag", open: 0, close: 0, label: "Geschlossen" }
  ];

  function updateStatus() {
    const now = new Date();
    const currentTime = now.getHours() + now.getMinutes() / 60;
    const currentDayIdx = now.getDay(); 
    const today = schedule[currentDayIdx];
    const isOpen = today.open !== 0 && currentTime >= today.open && currentTime < today.close;
    
    const statusEl = document.getElementById('status-text');
    const callBtn = document.getElementById('call-btn');

    if (isOpen) {
        statusEl.innerHTML = `<span style="color: #65FE08">Geöffnet</span>`;
        callBtn.className = "btn-green";
        callBtn.onclick = null;
    } else {
        statusEl.innerHTML = `<span style="color: #ff4d4d">Geschlossen</span>`;
        callBtn.className = "btn-red";
        callBtn.onclick = function(e) { e.preventDefault(); alert("Aktuell geschlossen."); };
    }

    // Anzeige-Reihenfolge: Montag (1) bis Samstag (6), dann Sonntag (0)
    let displayOrder = [1, 2, 3, 4, 5, 6, 0];
    let tableHtml = "";
    
    displayOrder.forEach(idx => {
      const item = schedule[idx];
      const isToday = idx === currentDayIdx;
      tableHtml += `
        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); ${isToday ? 'background:rgba(255,255,255,0.1)' : ''}">
          <td style="padding: 8px 10px;">${item.day}</td>
          <td style="padding: 8px 10px; text-align: right;">${item.label}</td>
        </tr>`;
    });
    document.getElementById('opening-table').innerHTML = tableHtml;
  }

  updateStatus();
  setInterval(updateStatus, 60000);
</script>
</body>
</html>
