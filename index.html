<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="google-site-verification" content="1h0mJmEKKiB0WFa2w9Txokx6s4TYYGrI54m2dTZAwCk" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiCroid</title>
  <link rel="icon" type="Logo.png" href="Logo.png">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; margin: 0; padding: 0; background-color: #0c1a26; color: #ffffff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

    main { padding: 40px 10px; display: flex; flex-direction: column; align-items: center; gap: 50px; width: 100%; }

    .content { 
        display: block; 
        text-align: center; 
        background-color: #1a334a; 
        width: 95%; 
        max-width: 800px; 
        border-radius: 30px; 
        padding: 5%; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        border: 1px solid rgba(255,255,255,0.05);
        margin: 0 auto;
        position: relative;
    }

    img { max-width: 100%; height: auto; }

    /* Button in Grau-Weiß Stil */
    #call-btn { background-color: #ffffff; border: none; color: #0c1a26; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; text-decoration: none; margin: 5px; display: inline-block; }

    .donation-link {
        position: absolute;
        top: 20px;
        right: 20px;
        text-decoration: none;
        font-size: 24px;
        transition: transform 0.2s;
    }
    .donation-link:hover { transform: scale(1.2); }

    details summary { cursor: pointer; list-style: none; font-weight: 900; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>

<main>
  <section id="startseite" class="content">
    <a href="https://paypal.me/DEIN_NAME" target="_blank" class="donation-link" title="Spenden">🐷</a>
    
    <p style="color: #ffffff; font-size: clamp(20px, 5vw, 40px); font-weight: 900; margin: 10px 0;">
      IT <span style="color: #bbb;">Hilfe</span>
    </p>
    
    <img src="Logo.png" style="width:200px; border-radius: 50%; border: 4px solid #ffffff; margin: 20px 0;"/>
    <br>
    <a href="tel:+4915206821179" id="call-btn">Anrufen</a>

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-top: 20px;">
      <div style="text-align: left;">Umkreis: Steingaden<br><small style="color: #bbb;">5 Min.</small></div>
      <img src="Screenshot_20260420_161537_Google.jpg" alt="Standort" style="width: 80px; height: 60px; object-fit: cover; border-radius: 8px; background: #ddd;">
    </div>

    <div style="padding: 15px 0;">
      <details>
        <summary>
          <span id="status-text" style="border: 2px solid #ffffff; padding: 5px 15px; border-radius: 12px; display: inline-block;">Prüfe...</span> ▼
        </summary>
        <table id="opening-table" style="width: 100%; margin-top: 15px; color: #ffffff; font-size: 0.9em; border-collapse: collapse; text-align: left;"></table>
      </details>
    </div>
  </section>

  <section id="tutorial" class="content" style="background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);">
    <div id="slider-container" style="position: relative; width: 100%; overflow: hidden; border-radius: 20px; touch-action: pan-y;">
      <div id="slider-track" style="display: flex;">
        <img src="erklär-bild.png" style="min-width: 100%; object-fit: contain;">
      </div>
    </div>
  </section>
</main>

<script>
  const schedule = [
    { day: "Sonntag", open: 0, close: 0, label: "geschlossen" },
    { day: "Montag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Dienstag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Mittwoch", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Donnerstag", open: 0, close: 0, label: "geschlossen" },
    { day: "Freitag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Samstag", open: 9.5, close: 17.5, label: "09:30–17:30" }
  ];

  function updateStatus() {
    const now = new Date();
    const currentTime = now.getHours() + now.getMinutes() / 60;
    const currentDayIdx = now.getDay();
    const today = schedule[currentDayIdx];
    const isOpen = today.open !== 0 && currentTime >= today.open && currentTime < today.close;
    const statusText = isOpen ? "Geöffnet" : "Geschlossen";
    const statusColor = isOpen ? "#ffffff" : "#ff4d4d"; // Weiß für Geöffnet, Rot für Geschlossen

    const statusEl = document.getElementById('status-text');
    let subText = isOpen ? `Schließt um: ${today.label.split('–')[1]}` : "Momentan nicht erreichbar";

    statusEl.innerHTML = `
      <span style="color: ${statusColor}">${statusText}</span>
      <div style="color: #bbb; font-size: 0.8em; margin-top: 5px; font-weight: normal;">${subText}</div>
    `;

    const tableEl = document.getElementById('opening-table');
    let tableHtml = "";
    for (let i = 0; i < 7; i++) {
      const item = schedule[i];
      const isToday = i === currentDayIdx;
      tableHtml += `
        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); ${isToday ? 'background: rgba(255,255,255,0.1);' : ''}">
          <td style="padding: 8px 10px;">${item.day}</td>
          <td style="padding: 8px 10px; text-align: right;">${item.label}</td>
        </tr>`;
    }
    tableEl.innerHTML = tableHtml;

    document.getElementById('call-btn').onclick = function(e) {
      if (!isOpen) {
        e.preventDefault();
        alert("SUPPORT GESCHLOSSEN\nBitte rufen Sie während der Öffnungszeiten an.");
      }
    };
  }

  updateStatus();
  setInterval(updateStatus, 60000);
</script>
</body>
</html>
