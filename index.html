<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OptiCroid</title>
  <link rel="icon" type="image/png" href="1768734429139.png">
  <style>
    html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; }
    body { 
        margin: 0; 
        font-family: Arial, sans-serif; 
        background: linear-gradient(to right, #000000,#0000Ff); 
        background-attachment: fixed; 
        padding-bottom: 85px; 
    }

    header { 
        background: rgba(12, 35, 54, 0.95); 
        backdrop-filter: blur(15px); 
        display: flex; 
        justify-content: space-around; 
        align-items: center; 
        width: 100%; 
        height: 75px; 
        position: fixed; 
        bottom: 0; 
        left: 0; 
        z-index: 10000; 
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 25px 25px 0 0; 
        box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    }

    nav { display: flex; justify-content: space-around; width: 100%; }

    nav a { 
        text-decoration: none; 
        color: #ffffff; 
        font-size: 10px; 
        display: flex; 
        flex-direction: column;
        align-items: center; 
        gap: 4px;
        flex: 1;
        position: relative;
        text-transform: uppercase;
        cursor: pointer;
    }

    nav a.active-link::after {
        content: "";
        position: absolute;
        bottom: -5px;
        width: 35px;
        height: 4px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 15px 3px white;
    }

    nav a span:first-child { font-size: 26px; }
    main { margin-left: 0; }
    
    .content { 
        display: none; 
        text-align: center; 
        background-color: #E0E0E0; 
        margin: 20px auto; 
        max-width: 90%; 
        border-radius: 15px; 
        padding: 30px;
    }
    .content.active { display: block; }
    .email-button { background-color: #FF0000; border: 2px solid #FF0000; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; display: inline-block; cursor: pointer; }
    .Anrufen-button { background-color: green; border: 2px solid #ADD8E6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; display: inline-block; cursor: pointer; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <nav>
      <a onclick="showSection('startseite', this)" class="active-link"><span>🏠</span><span>Start</span></a>
      <a onclick="showSection('Angebote', this)"><span>🫱🏾‍🫲🏽</span><span>Angebote</span></a>
      <a onclick="showSection('Infos', this)"><span>ℹ️</span><span>Infos</span></a>
      <a onclick="showSection('Profil', this)"><span>😃</span><span>Profil</span></a>
      <a onclick="showSection('Spiele', this)"><span>🎮</span><span>Spiele</span></a>
    </nav>
  </header>

  <main>
    <div id="maintenance-bar" style="display: flex; align-items: center; justify-content: center; gap: 15px; padding: 15px; background: red; border-bottom: 2px solid black; color: white;">
      <div style="width: 35px; height: 35px; border: 5px solid black; border-top: 5px solid blue; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <div style="text-align: left; color: black;">
        <strong style="display: block; font-size: 1.1em;">(500 Internal Server Error) Wird behoben</strong>
        <div id="countdown-display" style="font-family: monospace; font-weight: bold; font-size: 1.1em; display: flex; gap: 2px;">
          <span id="val-d"></span>:<span id="val-h"></span>:<span id="val-m"></span>:<span id="val-s"></span>
        </div>
      </div>
    </div>

    <section id="startseite" class="content active">
      <p style="color: #FF8C00; font-size: 40px; font-weight: 900; margin-bottom: 20px;"><strong>IT Dienstleistung / OptiCroid</strong></p>
      <img src="1768734429139.png" alt="Startseite" style="width:250px;"/>
      <h1><p style="color:#40E0D0;font-size: 25px;">Herzlich Willkommen</p></h1>
      <a class="email-button" onclick="handleContact('mailto:opticroid@gmail.com', 'opticroid@gmail.com')">E-Mail</a>
      <a class="Anrufen-button" onclick="handleContact('tel:+4915206821179', '+49 15206821179')">Anrufen</a>
    </section>

    <section id="Angebote" class="content"><h1>Übersicht</h1><p>Digitales PC Management</p></section>
    <section id="Infos" class="content"><h1>Informationen</h1><p>Markus Sieber - Steingaden</p></section>
    <section id="Profil" class="content"><h1>Profil</h1><p>Statistiken folgen bald.</p></section>
    <section id="Spiele" class="content">
        <div id="gameContainer" style="background: #f0f4f8; padding: 20px; border-radius: 20px;">
            <canvas id="game" width="750" height="300" style="width: 100%; background: white; border: 5px solid #0056b3; border-radius: 15px;"></canvas>
            <br><button id="startBtn" style="padding: 10px 30px; font-size: 20px; cursor: pointer;">START</button>
        </div>
    </section>
  </main>

  <script>
    function showSection(id, element) {
      document.querySelectorAll('.content').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active-link'));
      element.classList.add('active-link');
    }

    function updateCountdown() {
      const target = new Date("March 14, 2026 19:49:00").getTime();
      const now = new Date().getTime();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById("maintenance-bar").style.display = "none";
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById("val-d").innerText = String(d).padStart(2, '0');
      document.getElementById("val-h").innerText = String(h).padStart(2, '0');
      document.getElementById("val-m").innerText = String(m).padStart(2, '0');
      document.getElementById("val-s").innerText = String(s).padStart(2, '0');
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
