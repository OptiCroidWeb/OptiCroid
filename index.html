<script>
  const track = document.getElementById('slider-track');
  const audio = document.getElementById('tutorial-audio');
  let startX = 0;
  let currentIndex = 0;

  // Touch & Mouse Events für Wischen
  track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startMusic(); });
  track.addEventListener('touchend', e => handleSwipe(e.changedTouches[0].clientX));
  track.addEventListener('mousedown', e => { startX = e.clientX; startMusic(); });
  track.addEventListener('mouseup', e => handleSwipe(e.clientX));

  function startMusic() {
    if (audio.paused) audio.play();
  }

  function handleSwipe(endX) {
    const diff = startX - endX;
    if (Math.abs(diff) > 50) {
      if (diff > 0 && currentIndex < 5) currentIndex++;
      else if (diff < 0 && currentIndex > 0) currentIndex--;
      updateSlider();
    }
  }

  function updateSlider() {
    track.style.transform = `translateX(-${currentIndex * 100}%)`;
  }
</script>

  <script>
  const schedule = [
    { day: "Sonntag", open: 0, close: 0, label: "geschlossen" },
    { day: "Montag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Dienstag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Mittwoch", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Donnerstag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Freitag", open: 13.5, close: 17.5, label: "13:30–17:30" },
    { day: "Samstag", open: 9.5, close: 17.5, label: "09:30–17:30" }
  ];

  let lastStatus = null;

  function launchRocket() {
    const rocket = document.createElement('div');
    rocket.innerHTML = 'Online';
    rocket.style.cssText = 'position:fixed; bottom:-60px; left:50%; font-size:50px; transition:all 10s linear; z-index:1000; pointer-events:none;';
    document.body.appendChild(rocket);
    setTimeout(() => { rocket.style.transform = 'translateY(-120vh) scale(2)'; }, 100);
    setTimeout(() => rocket.remove(), 10500);
  }

  function updateStatus() {
    const now = new Date();
    const currentTime = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
    const currentDayIdx = now.getDay();
    const today = schedule[currentDayIdx];
    const isOpen = today.open !== 0 && currentTime >= today.open && currentTime < today.close;
    const statusText = isOpen ? "Geöffnet" : "Geschlossen";

    const statusEl = document.getElementById('status-text');
    if (lastStatus === "Geschlossen" && statusText === "Geöffnet") launchRocket();
    lastStatus = statusText;

    let subText = "";
    if (today.open === 0) {
      let nextDay = null;
      for (let i = 1; i < 7; i++) {
        let check = schedule[(currentDayIdx + i) % 7];
        if (check.open !== 0) { nextDay = check; break; }
      }
      subText = `${nextDay.day}: ${nextDay.label}`;
    } else if (isOpen) {
      let diff = today.close - currentTime;
      let closeTime = today.label.split('–')[1];
      subText = (diff <= 0.5) ? `Schließt demnächst: ${closeTime}` : `Schließt um: ${closeTime}`;
    } else {
      if (currentTime < today.open) {
        let diff = today.open - currentTime;
        let openTime = today.label.split('–')[0];
        subText = (diff <= 0.5) ? `Öffnet demnächst: ${openTime}` : `Öffnet um: ${openTime}`;
      } else {
        let tomorrow = schedule[(currentDayIdx + 1) % 7];
        subText = (tomorrow.open !== 0) ? `Öffnet morgen: ${tomorrow.label.split('–')[0]}` : "Heute geschlossen";
      }
    }

    statusEl.innerHTML = `
      <span style="color: ${isOpen ? '#65FE08' : '#ff4d4d'}">${statusText}</span>
      <div style="color: #268fbd; font-size: 0.9em; margin-top: 5px;">${subText}</div>
    `;

    const tableEl = document.getElementById('opening-table');
    let tableHtml = "";
    for (let i = 1; i < 7; i++) {
      const idx = (currentDayIdx + i) % 7;
      const item = schedule[idx];
      tableHtml += `
        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
          <td style="padding: 8px 0; width: 50%;">${item.day}</td>
          <td style="padding: 8px 0; text-align: right; font-family: monospace;">${item.label}</td>
        </tr>`;
    }
    tableEl.innerHTML = tableHtml;

    // --- HIER IST DIE NEUE LOGIK FÜR DEN ANRUF-BUTTON ---
    const callBtn = document.getElementById('call-btn');
    if (callBtn) {
      callBtn.onclick = function(e) {
        if (!isOpen) {
          e.preventDefault();
          alert("TELEFON SUPPORT\nGeschlossen");
        }
      };
    }
  }

  function shareProduct(event, id) {
    event.stopPropagation();
    const url = window.location.origin + window.location.pathname + '#' + id;
    if (navigator.share && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      navigator.share({ title: 'OptiCroid Angebot', text: 'Schau dir das an!', url: url });
    } else {
      navigator.clipboard.writeText(url);
      alert('Link wurde kopiert!');
    }
  }

  updateStatus();
  setInterval(updateStatus, 1000);
</script>
